name: Proxy

on:
  push:
    branches: [master]
    paths:
      - 'proxy/**'
      - '.github/workflows/proxy.yml'
  pull_request:
    branches: [master]
    paths:
      - 'proxy/**'
      - '.github/workflows/proxy.yml'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Maven build
        run: mvn -f proxy/pom.xml clean verify --batch-mode --no-transfer-progress

      - name: Coverage summary
        run: |
          {
            echo "## Proxy coverage"
            awk -F',' 'NR>1 {missed+=$4; covered+=$5} END {total=missed+covered; pct=(total>0)?(100*covered/total):0; printf "Instruction coverage: %.2f%% (%d/%d)\n", pct, covered, total}' proxy/target/site/jacoco/jacoco.csv
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: proxy-coverage
          path: proxy/target/site/jacoco/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: edt-mcp-proxy
          path: proxy/target/edt-mcp-proxy-*.jar
