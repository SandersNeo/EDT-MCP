name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Cache Tycho P2 repositories
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository/.cache/tycho
            ~/.m2/repository/p2
          key: ${{ runner.os }}-tycho-p2-${{ hashFiles('**/*.target') }}
          restore-keys: |
            ${{ runner.os }}-tycho-p2-

      - name: Extract version from tag
        id: version
        run: |
          # tag: v1.26.0 → 1.26.0
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set version from tag
        working-directory: mcp
        run: |
          mvn org.eclipse.tycho:tycho-versions-plugin:4.0.5:set-version \
            -DnewVersion=${{ steps.version.outputs.version }} \
            --batch-mode --no-transfer-progress

      - name: Maven build
        working-directory: mcp
        env:
          MAVEN_OPTS: -Xmx2g -XX:+UseParallelGC
        run: |
          # edt.1c.ru intermittently 502s / resets while Tycho mirrors the EDT p2 platform
          # (most often on a cold cache). Retry, but ONLY on those transient network errors —
          # fail fast on a real compile/test failure.
          for attempt in 1 2 3; do
            if mvn clean verify --batch-mode --no-transfer-progress -T 1C 2>&1 | tee "$RUNNER_TEMP/mvn.log"; then
              exit 0
            fi
            grep -qiE "Could not mirror artifact|Connection reset|HTTP code: 50[0-9]|Unable to read repository|Return code is: 50[0-9]" "$RUNNER_TEMP/mvn.log" \
              || { echo "::error::Maven build failed (not a transient edt.1c.ru error)"; exit 1; }
            echo "::warning::transient edt.1c.ru failure (attempt $attempt/3); cooling 30s"; sleep 30
          done
          exit 1

      - name: Build proxy
        env:
          MAVEN_OPTS: -Xmx2g
        run: |
          mvn -f proxy/pom.xml clean verify --batch-mode --no-transfer-progress
          cp proxy/target/edt-mcp-proxy-*.jar "edt-mcp-proxy-v${{ steps.version.outputs.version }}.jar"

      - name: Package archive
        run: |
          cd mcp/repositories/com.ditrix.edt.mcp.server.repository/target/repository
          zip -r "$GITHUB_WORKSPACE/MCP-EDT.v${{ steps.version.outputs.version }}.zip" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: MCP-EDT v${{ steps.version.outputs.version }}
          files: |
            MCP-EDT.v*.zip
            edt-mcp-proxy-v*.jar
          generate_release_notes: true
